<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Advisor AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --border: #222220;
    --accent: #c9f264;
    --accent-dim: #8aaa3a;
    --text: #e8e6df;
    --text-dim: #6b6960;
    --user-bubble: #1a1f10;
    --ai-bubble: #131312;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,242,100,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,242,100,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 14px;
    background: var(--bg);
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  header .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 2px 8px;
    border-radius: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.ended {
    background: var(--text-dim);
    box-shadow: none;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── App layout: sidebar + main ─────────────────────────── */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 14px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-header span {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #new-conv-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  #new-conv-btn:hover { border-color: var(--accent-dim); }

  #conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  #conversation-list::-webkit-scrollbar { width: 3px; }
  #conversation-list::-webkit-scrollbar-track { background: transparent; }
  #conversation-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-item {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    gap: 8px;
  }

  .conv-item:hover { background: rgba(201,242,100,0.04); }

  .conv-item.active {
    border-left-color: var(--accent);
    background: rgba(201,242,100,0.06);
  }

  .conv-info {
    flex: 1;
    min-width: 0;
  }

  .conv-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-item.active .conv-title { color: var(--accent); }

  .conv-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* Delete button — visible on hover only */
  .conv-delete {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .conv-item:hover .conv-delete { opacity: 1; }
  .conv-delete:hover { color: #ff6b6b; }

  /* ── Main chat area ──────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }

  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message-row {
    display: flex;
    padding: 6px 28px;
    gap: 14px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  /* History messages load without animation */
  .message-row.history {
    animation: none;
    opacity: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai { background: var(--accent); color: #0a0a08; }
  .avatar.user { background: var(--border); color: var(--text-dim); }

  .bubble {
    max-width: 68%;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13.5px;
    line-height: 1.7;
    font-weight: 300;
    white-space: pre-wrap;
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 2px;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid #2a3018;
    color: var(--accent);
    border-top-right-radius: 2px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 5px;
    height: 5px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 300;
    padding: 11px 14px;
    border-radius: 6px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #message-input:focus { border-color: var(--accent-dim); }
  #message-input::placeholder { color: var(--text-dim); }
  #message-input:disabled { opacity: 0.4; }

  #send-btn {
    background: var(--accent);
    color: #0a0a08;
    border: none;
    border-radius: 6px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #end-btn {
    display: none;
    align-items: center;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 14px;
    height: 44px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }

  #end-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }
  #end-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .system-msg {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 28px 16px;
  }

  .system-msg::before, .system-msg::after {
    content: '—';
    margin: 0 8px;
    opacity: 0.3;
  }

  /* Returning session divider */
  .system-msg.returning {
    color: var(--accent-dim);
    padding-top: 20px;
  }

  .error-msg {
    text-align: center;
    font-size: 12px;
    color: #ff6b6b;
    padding: 20px 28px;
  }

  .ended-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,8,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .ended-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px 48px;
    text-align: center;
    max-width: 380px;
  }

  .ended-card h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 12px;
  }

  .ended-card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <h1>Financial Advisor</h1>
  <span class="tag">AI</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<div class="app-layout">

  <!-- ── Sidebar: conversations ─────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Conversations</span>
      <button id="new-conv-btn" onclick="newConversation()">+ New</button>
    </div>
    <div id="conversation-list">
      <!-- Populated by JS -->
    </div>
  </aside>

  <!-- ── Main: chat window + input ───────────────────────── -->
  <div class="main">
    <div id="chat-window">
      <div class="system-msg">loading your session...</div>
    </div>

    <div class="input-area">
      <button id="end-btn" onclick="endSession()">End Session</button>
      <textarea
        id="message-input"
        placeholder="Ask about your financial health..."
        rows="1"
        disabled
      ></textarea>
      <button id="send-btn" disabled onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const SERVER_URL = "https://financial-advisor-chat-five.vercel.app";
  const clientId = window.location.pathname.split("/chat/")[1] || "default-user";

  const chatWindow = document.getElementById("chat-window");
  const input = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const endBtn = document.getElementById("end-btn");
  const statusDot = document.getElementById("status-dot");
  const convList = document.getElementById("conversation-list");

  let firstName = "";
  let currentConversationId = null;
  let conversations = [];

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addSystemMsg(text, isReturning = false) {
    const el = document.createElement("div");
    el.className = isReturning ? "system-msg returning" : "system-msg";
    el.textContent = text;
    chatWindow.appendChild(el);
  }

  function appendMessage(role, text, fromHistory = false) {
    const row = document.createElement("div");
    row.className = `message-row ${role}${fromHistory ? " history" : ""}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "AI" : "You";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "message-row ai";
    row.id = "typing-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";

    const indicator = document.createElement("div");
    indicator.className = "typing-indicator";
    indicator.appendChild(document.createElement("span"));
    indicator.appendChild(document.createElement("span"));
    indicator.appendChild(document.createElement("span"));

    bubble.appendChild(indicator);
    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  function enableChat() {
    input.disabled = false;
    sendBtn.disabled = false;
    endBtn.style.display = "flex";
    input.focus();
  }

  function disableChat() {
    input.disabled = true;
    sendBtn.disabled = true;
    endBtn.disabled = true;
    statusDot.classList.add("ended");
  }

  // ── Format relative time for sidebar timestamps ───────────
  function relativeTime(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  // ── Build trash icon SVG element ─────────────────────────
  function makeTrashIcon() {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "12");
    svg.setAttribute("height", "12");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("fill", "none");
    svg.setAttribute("stroke", "currentColor");
    svg.setAttribute("stroke-width", "2");
    svg.setAttribute("stroke-linecap", "round");
    svg.setAttribute("stroke-linejoin", "round");

    const bar = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
    bar.setAttribute("points", "3 6 5 6 21 6");

    const body = document.createElementNS("http://www.w3.org/2000/svg", "path");
    body.setAttribute("d", "M19 6l-1 14H6L5 6");

    const left = document.createElementNS("http://www.w3.org/2000/svg", "path");
    left.setAttribute("d", "M10 11v6");

    const right = document.createElementNS("http://www.w3.org/2000/svg", "path");
    right.setAttribute("d", "M14 11v6");

    svg.appendChild(bar);
    svg.appendChild(body);
    svg.appendChild(left);
    svg.appendChild(right);
    return svg;
  }

  // ── Render the sidebar conversation list ──────────────────
  function renderConversations() {
    convList.innerHTML = "";

    conversations.forEach(conv => {
      const item = document.createElement("div");
      item.className = `conv-item${conv.id === currentConversationId ? " active" : ""}`;
      item.dataset.id = conv.id;

      // Info block: title + timestamp
      const info = document.createElement("div");
      info.className = "conv-info";

      const title = document.createElement("div");
      title.className = "conv-title";
      title.textContent = conv.title; // textContent — never innerHTML for user data

      const time = document.createElement("div");
      time.className = "conv-time";
      time.textContent = relativeTime(conv.updated_at);

      info.appendChild(title);
      info.appendChild(time);

      // Select conversation on row click
      item.addEventListener("click", () => selectConversation(conv.id));

      // Info always comes first
      item.appendChild(info);

      // Delete button — hidden for protected conversations (e.g. Financial Score)
      if (!conv.is_protected) {
        const del = document.createElement("button");
        del.className = "conv-delete";
        del.title = "Delete conversation";
        del.appendChild(makeTrashIcon());

        // Stop propagation so delete click doesn't also select the conversation
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteConversation(conv.id);
        });

        item.appendChild(del);
      }

      convList.appendChild(item);
    });
  }

  // ── Fetch conversations from server ───────────────────────
  async function loadConversations() {
    const res = await fetch(`${SERVER_URL}/conversations/${clientId}`);
    if (!res.ok) return;
    const data = await res.json();
    conversations = data.conversations || [];
    renderConversations();
  }

  // ── Select and load messages for a conversation ──────────
  async function selectConversation(convId) {
    currentConversationId = convId;
    renderConversations();

    chatWindow.innerHTML = "";
    addSystemMsg("loading...");

    const res = await fetch(`${SERVER_URL}/conversations/${convId}/messages?clientId=${clientId}`);
    chatWindow.innerHTML = "";

    if (!res.ok) {
      addSystemMsg("failed to load messages");
      return;
    }

    const data = await res.json();
    const messages = data.messages || [];

    if (messages.length === 0) {
      // Empty conversation — prompt the user to start
      addSystemMsg("new conversation — ask anything");
    } else {
      addSystemMsg("session active");
      messages.forEach(msg => {
        const role = msg.role === "assistant" ? "ai" : "user";
        appendMessage(role, msg.content, true);
      });
    }

    enableChat();
  }

  // ── Create a new empty conversation ──────────────────────
  async function newConversation() {
    const res = await fetch(`${SERVER_URL}/conversations/${clientId}`, { method: "POST" });
    if (!res.ok) return;
    const data = await res.json();
    conversations.unshift(data.conversation);
    await selectConversation(data.conversation.id);
    renderConversations();
  }

  // ── Delete a conversation (clientId used for ownership) ───
  async function deleteConversation(convId) {
    if (!confirm("Delete this conversation?")) return;

    const res = await fetch(`${SERVER_URL}/conversations/${convId}`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clientId })
    });

    if (!res.ok) return;

    conversations = conversations.filter(c => c.id !== convId);

    // If the deleted conversation was active, switch to the next available one
    if (convId === currentConversationId) {
      currentConversationId = null;
      chatWindow.innerHTML = "";
      disableChat();
      endBtn.style.display = "none";

      if (conversations.length > 0) {
        selectConversation(conversations[0].id);
      } else {
        addSystemMsg("no conversations — start a new one");
      }
    }

    renderConversations();
  }

  // ── Load session on page open ─────────────────────────────
  window.addEventListener("load", async () => {
    try {
      const res = await fetch(`${SERVER_URL}/session/${clientId}`);

      if (!res.ok) {
        const errEl = document.createElement("div");
        errEl.className = "error-msg";
        errEl.textContent = "Session not found. Please contact your advisor to resend your report link.";
        chatWindow.replaceChildren(errEl);
        return;
      }

      const data = await res.json();
      firstName = data.first_name || "";

      // Load conversations and auto-select the most recently updated one
      await loadConversations();

      if (conversations.length > 0) {
        selectConversation(conversations[0].id);
      } else {
        // No conversations yet — show opening message as a fallback
        chatWindow.innerHTML = "";
        addSystemMsg("session active");
        appendMessage("ai", data.openingMessage);
        enableChat();
      }

    } catch (err) {
      const errEl = document.createElement("div");
      errEl.className = "error-msg";
      errEl.textContent = "Could not connect to server. Please try again later.";
      chatWindow.replaceChildren(errEl);
      console.error(err);
    }
  });

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    input.disabled = true;

    appendMessage("user", message);
    showTyping();

    try {
      const res = await fetch(`${SERVER_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clientId, conversationId: currentConversationId, message })
      });

      const data = await res.json();
      removeTyping();

      // Capture conversationId in case the server created one on the fly
      if (data.conversationId) currentConversationId = data.conversationId;

      appendMessage("ai", data.reply || "No response received.");

      // Refresh sidebar so the title and timestamp stay current
      await loadConversations();

    } catch (err) {
      removeTyping();
      appendMessage("ai", "Connection error — please try again.");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }

  async function endSession() {
    endBtn.disabled = true;

    try {
      await fetch(`${SERVER_URL}/end-session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clientId })
      });
    } catch (err) {
      console.error("End session error:", err);
    }

    disableChat();

    // Build the overlay with DOM methods — firstName is user data, avoid innerHTML
    const overlay = document.createElement("div");
    overlay.className = "ended-overlay";

    const card = document.createElement("div");
    card.className = "ended-card";

    const h2 = document.createElement("h2");
    h2.textContent = "Session Ended";

    const p = document.createElement("p");
    p.textContent = `Thank you, ${firstName}.`;
    p.appendChild(document.createElement("br"));
    p.appendChild(document.createTextNode("Your session has ended. You may close this window."));

    card.appendChild(h2);
    card.appendChild(p);
    overlay.appendChild(card);
    document.body.appendChild(overlay);
  }
</script>
</body>
</html>
