<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Advisor AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --border: #222220;
    --accent: #c9f264;
    --accent-dim: #8aaa3a;
    --text: #e8e6df;
    --text-dim: #6b6960;
    --user-bubble: #1a1f10;
    --ai-bubble: #131312;
    --font-display: 'DM Serif Display', serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,242,100,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,242,100,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 14px;
    background: var(--bg);
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  header .tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 2px 8px;
    border-radius: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: auto;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.ended {
    background: var(--text-dim);
    box-shadow: none;
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat-window::-webkit-scrollbar { width: 4px; }
  #chat-window::-webkit-scrollbar-track { background: transparent; }
  #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message-row {
    display: flex;
    padding: 6px 28px;
    gap: 14px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai { background: var(--accent); color: #0a0a08; }
  .avatar.user { background: var(--border); color: var(--text-dim); }

  .bubble {
    max-width: 68%;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13.5px;
    line-height: 1.7;
    font-weight: 300;
    white-space: pre-wrap;
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 2px;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid #2a3018;
    color: var(--accent);
    border-top-right-radius: 2px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 5px;
    height: 5px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    position: relative;
    z-index: 1;
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #message-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 300;
    padding: 11px 14px;
    border-radius: 6px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #message-input:focus { border-color: var(--accent-dim); }
  #message-input::placeholder { color: var(--text-dim); }
  #message-input:disabled { opacity: 0.4; }

  #send-btn {
    background: var(--accent);
    color: #0a0a08;
    border: none;
    border-radius: 6px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #end-btn {
    display: none;
    align-items: center;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 14px;
    height: 44px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }

  #end-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }
  #end-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .system-msg {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 28px 16px;
    position: relative;
    z-index: 1;
  }

  .system-msg::before, .system-msg::after {
    content: '—';
    margin: 0 8px;
    opacity: 0.3;
  }

  .error-msg {
    text-align: center;
    font-size: 12px;
    color: #ff6b6b;
    padding: 20px 28px;
    position: relative;
    z-index: 1;
  }

  .ended-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,8,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .ended-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 40px 48px;
    text-align: center;
    max-width: 380px;
  }

  .ended-card h2 {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 12px;
  }

  .ended-card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }
</style>
</head>
<body>

<header>
  <h1>Financial Advisor</h1>
  <span class="tag">AI</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="chat-window">
  <div class="system-msg">loading your session...</div>
</div>

<div class="input-area">
  <button id="end-btn" onclick="endSession()">End Session</button>
  <textarea
    id="message-input"
    placeholder="Ask about your financial health..."
    rows="1"
    disabled
  ></textarea>
  <button id="send-btn" disabled onclick="sendMessage()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const SERVER_URL = "https://financial-advisor-chat-five.vercel.app"
  const clientId = window.location.pathname.split("/chat/")[1] || "default-user";

  const chatWindow = document.getElementById("chat-window");
  const input = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const endBtn = document.getElementById("end-btn");
  const statusDot = document.getElementById("status-dot");

  let firstName = "";

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function appendMessage(role, text) {
    const row = document.createElement("div");
    row.className = `message-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "AI" : "You";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "message-row ai";
    row.id = "typing-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  function enableChat() {
    input.disabled = false;
    sendBtn.disabled = false;
    endBtn.style.display = "flex";
    input.focus();
  }

  function disableChat() {
    input.disabled = true;
    sendBtn.disabled = true;
    endBtn.disabled = true;
    statusDot.classList.add("ended");
  }

  window.addEventListener("load", async () => {
    try {
      const res = await fetch(`${SERVER_URL}/session/${clientId}`);

      if (!res.ok) {
        chatWindow.innerHTML = `<div class="error-msg">Session not found. Please contact your advisor to resend your report link.</div>`;
        return;
      }

      const data = await res.json();
      firstName = data.first_name || "";

      chatWindow.innerHTML = "";
      const sysMsg = document.createElement("div");
      sysMsg.className = "system-msg";
      sysMsg.textContent = "session active";
      chatWindow.appendChild(sysMsg);

      appendMessage("ai", data.openingMessage);
      enableChat();

    } catch (err) {
      chatWindow.innerHTML = `<div class="error-msg">Could not connect to server. Please try again later.</div>`;
      console.error(err);
    }
  });

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    input.disabled = true;

    appendMessage("user", message);
    showTyping();

    try {
      const res = await fetch(`${SERVER_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clientId, message })
      });

      const data = await res.json();
      removeTyping();
      appendMessage("ai", data.reply || "No response received.");
    } catch (err) {
      removeTyping();
      appendMessage("ai", "Connection error — please try again.");
      console.error(err);
    }

    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }

  async function endSession() {
    endBtn.disabled = true;

    // Call server to clear session from memory
    // TODO: when conversation saving is implemented, this endpoint
    // will persist history to a database before clearing memory
    try {
      await fetch(`${SERVER_URL}/end-session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ clientId })
      });
    } catch (err) {
      console.error("End session error:", err);
    }

    disableChat();

    const overlay = document.createElement("div");
    overlay.className = "ended-overlay";
    overlay.innerHTML = `
      <div class="ended-card">
        <h2>Session Ended</h2>
        <p>Thank you, ${firstName}.<br>Your session has ended. You may close this window.</p>
      </div>
    `;
    document.body.appendChild(overlay);
  }
</script>
</body>
</html>
